<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD | Internal Affairs Complaint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* ใช้พื้นหลังแบบคงที่เพื่อลดภาระเครื่อง */
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #020617;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, #0f172a 0%, #020617 100%);
            z-index: -1;
        }

        /* เปลี่ยนจาก blur เป็นสีทึบแสง (Smooth เลื่อนลื่นขึ้น 100%) */
        .glass-panel { 
            background: rgba(30, 41, 59, 0.95); 
            border: 1px solid rgba(249, 115, 22, 0.2); 
            transform: translateZ(0);
            will-change: transform;
        }

        .glow-orange { text-shadow: 0 0 8px rgba(249, 115, 22, 0.4); }
        
        .input-style { 
            background: rgba(15, 23, 42, 0.8); 
            border: 1px solid rgba(71, 85, 105, 0.5); 
            transition: border-color 0.2s; 
        }
        
        .input-style:focus { 
            border-color: #f97316; 
            outline: none; 
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-6 flex flex-col items-center">

    <div class="bg-layer"></div>

    <div class="max-w-3xl w-full py-10">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-orange-500 italic glow-orange tracking-tighter uppercase">Internal Affairs</h1>
                <p class="text-slate-500 text-xs uppercase tracking-[0.3em] mt-1">LSPD Professional Standards Bureau</p>
            </div>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-2xl text-sm transition-all border border-slate-700 flex items-center gap-2 active:scale-95">
                🏠 กลับหน้าหลัก
            </a>
        </div>

        <form id="complaintForm" class="glass-panel p-8 md:p-10 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="relative z-10 space-y-6">
                <div class="flex items-center gap-3 mb-4 border-b border-slate-700/50 pb-4">
                    <span class="text-2xl">🗣️</span>
                    <h2 class="text-xl font-bold text-white uppercase italic">แบบฟอร์มร้องเรียนการปฏิบัติหน้าที่</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">ชื่อผู้ร้องเรียน (Citizen Name)</label>
                        <input type="text" id="citizenName" required class="input-style w-full p-4 rounded-xl text-white outline-none" placeholder="ระบุชื่อของคุณ">
                    </div>
                    <div>
                        <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">เบอร์โทรติดต่อ (Phone Number)</label>
                        <input type="text" id="contact" required class="input-style w-full p-4 rounded-xl text-white outline-none" placeholder="000-0000">
                    </div>
                </div>

                <div>
                    <label class="block mb-2 text-xs font-bold text-orange-500 uppercase tracking-widest">เจ้าหน้าที่ที่ถูกร้องเรียน (Target Officer)</label>
                    <input type="text" id="targetOfficer" required class="input-style w-full p-4 rounded-xl text-white outline-none" placeholder="ชื่อ หรือ เลขรหัสประจำตัว">
                </div>

                <div>
                    <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">รายละเอียดเหตุการณ์ (Details)</label>
                    <textarea id="complaintDetails" rows="5" required class="input-style w-full p-4 rounded-xl text-white outline-none" placeholder="ระบุรายละเอียดโดยละเอียด..."></textarea>
                </div>

                <div class="bg-orange-950/30 border border-orange-900/50 p-4 rounded-xl">
                    <p class="text-[10px] text-orange-400 leading-relaxed uppercase tracking-wider">
                        ⚠️ คำเตือน: การให้ข้อมูลเท็จเพื่อกลั่นแกล้งเจ้าหน้าที่ มีโทษตามกฎหมายเมือง
                    </p>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg active:scale-[0.98] uppercase tracking-[0.2em] flex items-center justify-center gap-3">
                    <span>ส่งเรื่องร้องเรียน (Submit)</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        const discordWebhook = "https://discord.com/api/webhooks/1481782188667043953/VFJ-Cg6UwNK_Fwn_u7LISXfKO8Smtf0fQgY2MiXpppU_vXDklarIHikePuiUXFlMzBiY";
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'กำลังส่งเรื่อง...';
            btn.disabled = true;

            const payload = {
                embeds: [{
                    title: "🗣️ มีการร้องเรียนเจ้าหน้าที่ตำรวจใหม่",
                    color: 16744192,
                    fields: [
                        { name: "👤 ผู้ร้องเรียน", value: document.getElementById('citizenName').value, inline: true },
                        { name: "📞 ติดต่อ", value: document.getElementById('contact').value, inline: true },
                        { name: "👮 เจ้าหน้าที่ที่ถูกร้องเรียน", value: document.getElementById('targetOfficer').value, inline: false },
                        { name: "📝 รายละเอียด", value: document.getElementById('complaintDetails').value, inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    alert("✅ ส่งเรื่องร้องเรียนสำเร็จ!");
                    document.getElementById('complaintForm').reset();
                } else { throw new Error(); }
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาด");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
