<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD | Internal Affairs Complaint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: radial-gradient(circle, #0f172a 0%, #020617 100%); }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(249, 115, 22, 0.2); }
        .glow-orange { text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
        .input-style { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(71, 85, 105, 0.5); transition: all 0.3s; }
        .input-style:focus { border-color: #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); outline: none; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-6 flex flex-col items-center">

    <div class="max-w-3xl w-full py-10">
        <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-orange-500 italic glow-orange tracking-tighter uppercase">Internal Affairs</h1>
                <p class="text-slate-500 text-xs uppercase tracking-[0.3em] mt-1">LSPD Professional Standards Bureau</p>
            </div>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-2xl text-sm transition-all border border-slate-700 flex items-center gap-2 active:scale-95 shadow-lg">
                🏠 กลับหน้าหลัก
            </a>
        </div>

        <form id="complaintForm" class="glass-panel p-8 md:p-10 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-orange-600/10 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 space-y-6">
                <div class="flex items-center gap-3 mb-4 border-b border-slate-700/50 pb-4">
                    <span class="text-2xl">🗣️</span>
                    <h2 class="text-xl font-bold text-white uppercase italic">แบบฟอร์มร้องเรียนการปฏิบัติหน้าที่</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">ชื่อผู้ร้องเรียน (Citizen Name)</label>
                        <input type="text" id="citizenName" required class="input-style w-full p-4 rounded-xl text-white placeholder:text-slate-700" placeholder="ระบุชื่อของคุณ">
                    </div>
                    <div>
                        <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">เบอร์โทรติดต่อ (Phone Number)</label>
                        <input type="text" id="contact" required class="input-style w-full p-4 rounded-xl text-white placeholder:text-slate-700" placeholder="000-0000">
                    </div>
                </div>

                <hr class="border-slate-800">

                <div>
                    <label class="block mb-2 text-xs font-bold text-orange-500 uppercase tracking-widest">เจ้าหน้าที่ที่ถูกร้องเรียน (Target Officer)</label>
                    <input type="text" id="targetOfficer" required class="input-style w-full p-4 rounded-xl text-white placeholder:text-slate-700" placeholder="ชื่อ หรือ เลขรหัสประจำตัว (ถ้าทราบ)">
                </div>

                <div>
                    <label class="block mb-2 text-xs font-bold text-slate-500 uppercase tracking-widest">รายละเอียดเหตุการณ์ / พฤติกรรม (Details)</label>
                    <textarea id="complaintDetails" rows="5" required class="input-style w-full p-4 rounded-xl text-white placeholder:text-slate-700" placeholder="ระบุวัน เวลา สถานที่ และพฤติกรรมของเจ้าหน้าที่โดยละเอียด..."></textarea>
                </div>

                <div class="bg-orange-950/30 border border-orange-900/50 p-4 rounded-xl">
                    <p class="text-[10px] text-orange-400 leading-relaxed uppercase tracking-wider">
                        ⚠️ คำเตือน: การให้ข้อมูลเท็จเพื่อกลั่นแกล้งเจ้าหน้าที่ มีโทษตามกฎหมายเมืองและอาจถูกดำเนินคดีขั้นสูงสุด
                    </p>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" 
                        class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-5 rounded-2xl transition-all shadow-lg shadow-orange-900/30 transform active:scale-[0.98] uppercase tracking-[0.2em] flex items-center justify-center gap-3">
                        <span>ส่งเรื่องร้องเรียน (Submit)</span>
                        <span class="text-xl">🛡️</span>
                    </button>
                </div>
            </div>
        </form>

        <p class="mt-10 text-center text-[10px] text-slate-700 uppercase tracking-[0.5em] font-bold">
            Internal Affairs Division | LSPD Headquarters
        </p>
    </div>

    <script>
        // ใส่ Webhook สำหรับห้องร้องเรียนโดยเฉพาะ
        const discordWebhook = "https://discord.com/api/webhooks/1481782188667043953/VFJ-Cg6UwNK_Fwn_u7LISXfKO8Smtf0fQgY2MiXpppU_vXDklarIHikePuiUXFlMzBiY";

        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="animate-spin text-xl">🌀</span> กำลังส่งเรื่อง...';
            btn.disabled = true;

            const payload = {
                embeds: [{
                    title: "🗣️ มีการร้องเรียนเจ้าหน้าที่ตำรวจใหม่",
                    color: 16744192, // Orange Color
                    fields: [
                        { name: "👤 ผู้ร้องเรียน", value: document.getElementById('citizenName').value, inline: true },
                        { name: "📞 ติดต่อ", value: document.getElementById('contact').value, inline: true },
                        { name: "👮 เจ้าหน้าที่ที่ถูกร้องเรียน", value: document.getElementById('targetOfficer').value, inline: false },
                        { name: "📝 รายละเอียด", value: document.getElementById('complaintDetails').value, inline: false }
                    ],
                    timestamp: new Date().toISOString(),
                    footer: { text: "LSPD Internal Affairs Division" }
                }]
            };

            try {
                const response = await fetch(discordWebhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ ส่งเรื่องร้องเรียนสำเร็จ! หน่วยงานจเรตำรวจ (IA) จะดำเนินการตรวจสอบโดยเร็วที่สุด");
                    document.getElementById('complaintForm').reset();
                } else {
                    throw new Error();
                }
            } catch (err) {
                alert("❌ เกิดข้อผิดพลาดในการส่งข้อมูล โปรดตรวจสอบการเชื่อมต่อ");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
